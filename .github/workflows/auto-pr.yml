name: Auto-create and merge PR

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if none exists
        id: pr
        run: |
          EXISTING=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            PR_URL=$(gh pr create --repo "$REPO" --head "$BRANCH" --base main \
              --title "$BRANCH" \
              --body "Auto-created PR for branch \`$BRANCH\`." 2>&1 | tail -1)
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          else
            PR_URL="https://github.com/$REPO/pull/$EXISTING"
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          fi
        env:
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        run: gh pr merge "$PR_URL" --squash --delete-branch
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
